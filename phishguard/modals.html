<!-- PhishGuard AI — modals.html partial -->
<!-- USER MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">👤 Add User</div>
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="modal-name" type="text" placeholder="Full Name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="modal-email" type="email" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="modal-pass" type="password" placeholder="Password (leave blank to keep)">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" id="modal-role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div id="modal-err" style="display:none;color:var(--red);font-family:'JetBrains Mono',monospace;font-size:12px;margin-top:8px;background:rgba(255,61,90,0.08);padding:8px 12px;border-radius:6px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="save-btn" id="modal-save-btn" onclick="saveUserModal()">Save User</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title" style="color:var(--red)">⚠ Delete User</div>
    <p style="font-size:14px;color:var(--muted);line-height:1.6;font-family:'JetBrains Mono',monospace">Are you sure you want to permanently delete <strong id="delete-name" style="color:var(--text)"></strong>? This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete User</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
